---
layout: default
---

<div class="container">
  <div class="cover">
    <img src="{{ '/assets/images/cover.jpg' | relative_url }}" alt="{{ site.title }}">
  </div>

  <p class="tagline">{{ site.description }}</p>

  <section class="links">
    {% for link in site.links %}
    <a href="{{ link.url }}" class="link-block" target="_blank" rel="noopener">
      {{ link.title }}
    </a>
    {% endfor %}
  </section>
</div>
